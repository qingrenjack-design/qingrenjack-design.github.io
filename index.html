<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bloom - 让每一个她，被看见</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg-base: #F7F3EE;
  --bg-card: #EFE7DD;
  --bg-subtle: #D9CFC3;
  --accent-sage: #C7D6CC;
  --accent-blush: #BDA8A0;
  --text-primary: #3D3833;
  --text-secondary: #6B625B;
  --text-placeholder: #A89E96;
  --bubble-user: #EDE3D8;
  --bubble-ai: #FFFFFF;
  --border: #E4DDD5;
  --radius-sm: 8px;
  --radius-md: 16px;
  --radius-lg: 24px;
  --shadow-card: 0 2px 12px rgba(61,56,51,0.06);
  --shadow-bubble: 0 1px 4px rgba(61,56,51,0.04);
  --font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}

html, body {
  height: 100%;
  font-family: var(--font-family);
  background: #1a1a2e;
  color: var(--text-primary);
  line-height: 1.7;
  overflow: hidden;
}

.app {
  height: 100%;
  display: flex;
  flex-direction: column;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
}

/* ========== CHAT PAGE — IMMERSIVE ========== */
.chat-page {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: #0a0a0a;
  position: relative;
  overflow: hidden;
}

/* Top bar - transparent overlay */
.chat-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  flex-shrink: 0;
  z-index: 5;
}

.chat-top-left {
  width: 40px;
  display: flex;
  align-items: center;
}

.menu-dots {
  font-size: 20px;
  color: rgba(255,255,255,0.4);
  cursor: pointer;
  background: none;
  border: none;
  font-family: inherit;
}

.scene-selector {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);
  font-size: 14px;
  font-weight: 500;
  color: rgba(255,255,255,0.85);
  cursor: pointer;
  font-family: inherit;
  transition: background 0.2s;
}

.scene-selector:hover { background: rgba(255,255,255,0.18); }
.scene-selector .grid-icon { font-size: 14px; }

.chat-top-right {
  width: 40px;
  display: flex;
  align-items: center;
  justify-content: flex-end;
}

.settings-icon {
  font-size: 18px;
  color: rgba(255,255,255,0.4);
  cursor: pointer;
  background: none;
  border: none;
  font-family: inherit;
}

/* Central character area */
.character-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0 20px;
  transition: all 0.4s ease;
}

.character-area.with-panel {
  flex: 0;
  padding: 16px 20px 0;
  justify-content: flex-start;
}

.bloom-avatar {
  position: relative;
  width: 220px;
  height: 220px;
  transition: all 0.4s ease;
}

.with-panel .bloom-avatar {
  width: 100px;
  height: 100px;
}

/* Bloom SVG character */
.bloom-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  filter: drop-shadow(0 0 40px rgba(255,210,100,0.5))
          drop-shadow(0 0 80px rgba(255,190,60,0.25));
}

/* State face swaps via CSS */
.bloom-face-idle,
.bloom-face-listen,
.bloom-face-think,
.bloom-face-speak { transition: opacity 0.3s ease; }

.bloom-face-listen,
.bloom-face-think,
.bloom-face-speak { opacity: 0; }

.bloom-avatar.listening .bloom-face-idle { opacity: 0; }
.bloom-avatar.listening .bloom-face-listen { opacity: 1; }

.bloom-avatar.thinking .bloom-face-idle { opacity: 0; }
.bloom-avatar.thinking .bloom-face-think { opacity: 1; }

.bloom-avatar.speaking .bloom-face-idle { opacity: 0; }
.bloom-avatar.speaking .bloom-face-speak { opacity: 1; }

/* ===== Bloom states ===== */
.bloom-avatar.idle { animation: avatar-float 4s ease-in-out infinite; }
.bloom-avatar.listening { animation: avatar-listen 1.5s ease-in-out infinite; }
.bloom-avatar.listening .bloom-svg {
  filter: drop-shadow(0 0 50px rgba(255,210,100,0.65))
          drop-shadow(0 0 100px rgba(255,190,60,0.35));
}
.bloom-avatar.thinking { animation: avatar-think 2s ease-in-out infinite; }
.bloom-avatar.speaking { animation: avatar-speak 1.8s ease-in-out infinite; }
.bloom-avatar.speaking .bloom-svg {
  filter: drop-shadow(0 0 50px rgba(255,210,100,0.65))
          drop-shadow(0 0 100px rgba(255,190,60,0.35));
}

@keyframes avatar-float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

@keyframes avatar-listen {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.04); }
}

@keyframes avatar-think {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  25% { transform: translateY(-6px) rotate(-3deg); }
  75% { transform: translateY(-4px) rotate(3deg); }
}

@keyframes avatar-speak {
  0%, 100% { transform: translateY(0) scale(1); }
  25% { transform: translateY(-6px) scale(1.03); }
  50% { transform: translateY(-3px) scale(1); }
  75% { transform: translateY(-8px) scale(1.02); }
}

@keyframes eyes-look-up {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
}

@keyframes glow-bright {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.1); }
}

/* Response / Status area */
.response-area {
  text-align: center;
  padding: 20px 30px 0;
  flex-shrink: 0;
  transition: all 0.4s ease;
}

.with-panel .response-area {
  padding: 8px 20px 0;
}

.response-text {
  font-size: 15px;
  color: rgba(255,255,255,0.7);
  line-height: 1.6;
  max-height: 80px;
  overflow: hidden;
  transition: all 0.3s;
}

.with-panel .response-text { display: none; }

.status-dots {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin: 16px 0 8px;
}

.status-dots span {
  width: 8px;
  height: 8px;
  background: rgba(255,255,255,0.25);
  border-radius: 50%;
}

.status-dots.active span {
  animation: dot-pulse 1.4s ease-in-out infinite;
}
.status-dots.active span:nth-child(2) { animation-delay: 0.2s; }
.status-dots.active span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dot-pulse {
  0%, 60%, 100% { opacity: 0.3; transform: scale(1); }
  30% { opacity: 1; transform: scale(1.3); }
}

.status-label {
  font-size: 14px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 8px;
}

/* Bottom action buttons */
.chat-actions {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 16px 20px;
  flex-shrink: 0;
}

.action-btn {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  cursor: pointer;
  transition: all 0.2s;
  color: rgba(255,255,255,0.8);
  font-family: inherit;
}

.action-btn:hover {
  background: rgba(255,255,255,0.15);
  transform: scale(1.05);
}

.action-btn.primary {
  width: 64px;
  height: 64px;
  background: rgba(255,255,255,0.12);
  font-size: 26px;
}

.action-btn.recording {
  background: rgba(200,160,120,0.4);
  color: white;
  border-color: rgba(255,200,120,0.3);
  animation: recording-pulse 1.5s ease-in-out infinite;
  box-shadow: 0 0 0 0 rgba(255,200,120,0.3);
}

@keyframes recording-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,200,120,0.3); }
  50% { box-shadow: 0 0 0 14px rgba(255,200,120,0); }
}

.action-btn.close-btn {
  color: #d06060;
}

/* AI footer */
.ai-footer {
  text-align: center;
  padding-bottom: 12px;
  font-size: 11px;
  color: rgba(255,255,255,0.2);
  flex-shrink: 0;
}

/* ========== MESSAGE PANEL (slide up) ========== */
.msg-panel {
  display: none;
  flex-direction: column;
  flex: 1;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(20px);
  border-radius: 24px 24px 0 0;
  margin: 0;
  overflow: hidden;
  animation: panel-up 0.35s ease;
}

.msg-panel.active {
  display: flex;
}

@keyframes panel-up {
  from { transform: translateY(40px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.msg-panel-header {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px 20px 6px;
  flex-shrink: 0;
}

.panel-handle {
  width: 36px;
  height: 4px;
  background: rgba(61,56,51,0.15);
  border-radius: 2px;
  cursor: pointer;
}

.msg-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  scroll-behavior: smooth;
}

.message {
  max-width: 80%;
  padding: 10px 14px;
  font-size: 14px;
  line-height: 1.6;
  animation: msg-in 0.3s ease;
}

@keyframes msg-in {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.user {
  align-self: flex-end;
  background: var(--bubble-user);
  border-radius: 16px 16px 4px 16px;
  max-width: 72%;
}

.message.ai {
  align-self: flex-start;
  background: white;
  border-radius: 16px 16px 16px 4px;
  box-shadow: var(--shadow-bubble);
}

.message .source-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-top: 6px;
  padding: 3px 8px;
  background: #F0EBE5;
  border-radius: 6px;
  font-size: 11px;
  color: var(--text-secondary);
}

.message.loading {
  align-self: flex-start;
  background: white;
  border-radius: 16px 16px 16px 4px;
  box-shadow: var(--shadow-bubble);
  padding: 14px 18px;
}

.loading-dots {
  display: flex;
  gap: 4px;
}

.loading-dots span {
  width: 6px; height: 6px;
  background: var(--bg-subtle);
  border-radius: 50%;
  animation: ldot 1.4s ease-in-out infinite;
}
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes ldot {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-5px); }
}

/* Panel input area */
.panel-input-area {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  padding: 8px 16px 12px;
  flex-shrink: 0;
  border-top: 1px solid rgba(61,56,51,0.06);
}

.panel-input {
  flex: 1;
  min-height: 38px;
  max-height: 100px;
  padding: 8px 14px;
  background: var(--bg-base);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 14px;
  font-family: inherit;
  color: var(--text-primary);
  resize: none;
  outline: none;
  line-height: 1.4;
}

.panel-input::placeholder { color: var(--text-placeholder); }

.panel-send-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  border: none;
  background: var(--bg-subtle);
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  flex-shrink: 0;
  font-family: inherit;
  transition: background 0.2s;
}

.panel-send-btn.active { background: var(--accent-blush); }

/* ========== SCENE MODAL ========== */
.scene-modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.25);
  z-index: 50;
  animation: fade-in 0.2s ease;
}
.scene-modal-overlay.active { display: flex; align-items: flex-end; justify-content: center; }

@keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

.scene-modal {
  width: 100%;
  max-width: 480px;
  background: #fff;
  border-radius: 24px 24px 0 0;
  padding: 20px;
  animation: slide-up 0.3s ease;
}

@keyframes slide-up {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.scene-modal-handle {
  width: 36px; height: 4px;
  background: var(--bg-subtle);
  border-radius: 2px;
  margin: 0 auto 16px;
}

.scene-modal h3 {
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 14px;
  text-align: center;
}

.scene-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.scene-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: var(--bg-base);
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  font-family: inherit;
  text-align: left;
  transition: background 0.2s;
  width: 100%;
}

.scene-item:hover { background: var(--bg-card); }

.scene-emoji { font-size: 24px; }
.scene-item-text {
  flex: 1;
}
.scene-item-title { font-size: 15px; font-weight: 500; color: var(--text-primary); }
.scene-item-desc { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

/* ========== OTHER PAGES ========== */
.page {
  display: none;
  flex: 1;
  overflow: hidden;
  flex-direction: column;
}
.page.active { display: flex; }

/* Sub-page top bar */
.sub-top-bar {
  height: 52px;
  display: flex;
  align-items: center;
  padding: 0 16px;
  background: var(--bg-base);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.back-btn {
  background: none;
  border: none;
  font-size: 20px;
  cursor: pointer;
  color: var(--text-primary);
  padding: 4px 8px;
  font-family: inherit;
}

.sub-top-title {
  flex: 1;
  text-align: center;
  font-size: 16px;
  font-weight: 600;
  margin-right: 36px;
}

/* ========== LIBRARY ========== */
.library-page { overflow-y: auto; padding: 16px 20px; background: var(--bg-base); }

.library-header { margin-bottom: 14px; }
.library-header h1 { font-size: 20px; font-weight: 700; }
.library-header p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

.tag-filter {
  display: flex; gap: 8px; overflow-x: auto;
  padding-bottom: 12px; margin-bottom: 14px;
  -webkit-overflow-scrolling: touch;
}
.tag-filter::-webkit-scrollbar { display: none; }

.tag-btn {
  padding: 6px 14px; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: 20px;
  font-size: 13px; color: var(--text-secondary);
  cursor: pointer; white-space: nowrap; font-family: inherit; transition: all 0.2s;
}
.tag-btn.active { background: var(--accent-blush); border-color: var(--accent-blush); color: #fff; }

.book-list { display: flex; flex-direction: column; gap: 12px; }

.book-card {
  background: #fff; border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card); padding: 16px;
  display: flex; gap: 14px; cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}
.book-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(61,56,51,0.1); }

.book-cover { width: 60px; height: 80px; border-radius: 8px; flex-shrink: 0; }
.book-info { flex: 1; min-width: 0; }
.book-title { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
.book-author { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
.book-summary {
  font-size: 13px; color: var(--text-secondary); line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.book-footer { display: flex; align-items: center; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.book-tag { padding: 2px 8px; background: var(--bg-card); border-radius: 10px; font-size: 11px; color: var(--text-secondary); }
.book-included { margin-left: auto; padding: 3px 8px; background: var(--accent-sage); border-radius: 6px; font-size: 11px; color: #4A7A5C; }

/* Book Drawer */
.drawer-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(61,56,51,0.3); z-index: 100; animation: fade-in 0.2s ease;
}
.drawer-overlay.active { display: block; }

.drawer {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px; max-height: 70vh;
  background: #fff; border-radius: 24px 24px 0 0;
  padding: 24px 20px; z-index: 101; overflow-y: auto;
  animation: slide-up 0.3s ease;
}

.drawer-handle { width: 40px; height: 4px; background: var(--bg-subtle); border-radius: 2px; margin: 0 auto 16px; }
.drawer h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.drawer .subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; }
.drawer .key-points { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.drawer .key-points li { padding: 10px 12px; background: var(--bg-base); border-radius: var(--radius-sm); font-size: 14px; line-height: 1.5; }
.drawer .key-points li::before { content: '· '; color: var(--accent-blush); font-weight: 700; }

/* ========== SETTINGS ========== */
.settings-page { overflow-y: auto; padding: 16px 20px; background: var(--bg-base); }

.settings-header { margin-bottom: 20px; }
.settings-header h1 { font-size: 20px; font-weight: 700; }
.settings-header p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

.settings-section { margin-bottom: 24px; }
.section-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 12px; letter-spacing: 0.5px; }
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 14px; color: var(--text-primary); margin-bottom: 6px; font-weight: 500; }

.form-input {
  width: 100%; padding: 10px 14px; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 14px; font-family: inherit; color: var(--text-primary);
  outline: none; transition: border-color 0.2s;
}
.form-input:focus { border-color: var(--accent-blush); }
.form-input::placeholder { color: var(--text-placeholder); }

.form-select {
  width: 100%; padding: 10px 14px; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 14px; font-family: inherit; color: var(--text-primary);
  outline: none; appearance: none; cursor: pointer;
}

.input-with-toggle { position: relative; }
.input-with-toggle .toggle-vis {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; font-size: 16px; color: var(--text-placeholder);
}

.prompt-collapse { border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
.prompt-collapse-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; background: var(--bg-card); cursor: pointer;
  font-size: 14px; font-weight: 500;
}
.prompt-collapse-header .arrow { transition: transform 0.2s; }
.prompt-collapse.open .arrow { transform: rotate(180deg); }

.prompt-textarea {
  display: none; width: 100%; min-height: 200px;
  padding: 12px 14px; border: none; border-top: 1px solid var(--border);
  font-size: 13px; font-family: inherit; color: var(--text-primary);
  line-height: 1.6; resize: vertical; outline: none;
}
.prompt-collapse.open .prompt-textarea { display: block; }

.btn {
  padding: 12px 20px; border-radius: var(--radius-md); border: none;
  font-size: 15px; font-family: inherit; font-weight: 500;
  cursor: pointer; transition: all 0.2s; width: 100%; text-align: center;
}
.btn-primary { background: var(--accent-blush); color: #fff; }
.btn-primary:hover { opacity: 0.9; }
.btn-secondary { background: var(--bg-card); border: 1px solid var(--bg-subtle); color: var(--text-primary); }
.btn-secondary:hover { background: #E6DDD4; }

.test-result { margin-top: 8px; font-size: 13px; min-height: 20px; }
.test-result.success { color: #4A7A5C; }
.test-result.error { color: #A85050; }

.settings-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }

/* Responsive */
@media (min-width: 481px) {
  .app { border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
}

@media (max-width: 375px) {
  .bloom-avatar { width: 180px; height: 180px; }
  .with-panel .bloom-avatar { width: 80px; height: 80px; }
  .action-btn { width: 48px; height: 48px; font-size: 20px; }
  .action-btn.primary { width: 56px; height: 56px; font-size: 24px; }
}
</style>
</head>
<body>

<div class="app">

  <!-- ========== CHAT PAGE ========== -->
  <div class="page active chat-page" id="page-chat">

    <!-- Top bar -->
    <div class="chat-top">

知识库涵盖主题：
- 女性心血管症状与误诊（《看不见的女性》《女性心血管健康指南》）
- 女性药物剂量与不良反应差异（FDA数据、《制造误诊》）
- 性别数据缺口与系统性偏见（UN Women报告、《看不见的女性》）
- 女性职场隐性偏见与薪酬谈判（《看不见的女性》）

当用户描述身体症状时，始终从女性视角分析，不要默认使用男性症状标准作为参照。
回答长度控制在100-300字，口语化，适合语音播报。
结构：直接回答 → 女性特别提示（如有）→ 建议行动。
不要使用 Markdown 格式。不要使用标题、编号列表、星号或井号。`;

const PROVIDER_CONFIG = {
  doubao: { baseUrl: 'https://ark.cn-beijing.volces.com/api/v3/chat/completions', defaultModel: 'doubao-1-5-pro-32k-250115' },
  openai: { baseUrl: 'https://api.openai.com/v1/chat/completions', defaultModel: 'gpt-4o-mini' },
  custom: { baseUrl: '', defaultModel: '' }
};

// ========== STATE ==========
let messages = [];
let isRecording = false;
let recognition = null;
let keepListening = false;
let voiceSilenceTimer = null;
let voiceWatchdog = null;
let latestVoiceText = '';
let currentFilter = '全部';
let panelOpen = false;

// ========== INIT ==========
function init() {
  loadSettings();
  renderLibrary();
  document.getElementById('systemPromptInput').value = getSetting('systemPrompt') || DEFAULT_SYSTEM_PROMPT;
  document.getElementById('panelInput').addEventListener('input', updatePanelSendBtn);
  updatePanelSendBtn();
}

// ========== PAGES ==========
function switchPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
}

// ========== SETTINGS ==========
function getSetting(k) { return localStorage.getItem('bloom_' + k); }
function setSetting(k, v) { localStorage.setItem('bloom_' + k, v); }

function loadSettings() {
  const p = getSetting('provider') || 'doubao';
  document.getElementById('providerSelect').value = p;
  document.getElementById('apiKeyInput').value = getSetting('apiKey') || '';
  document.getElementById('baseUrlInput').value = getSetting('baseUrl') || '';
  document.getElementById('modelInput').value = getSetting('model') || PROVIDER_CONFIG[p].defaultModel;
  onProviderChange();
}

function saveSettings() {
  const p = document.getElementById('providerSelect').value;
  setSetting('provider', p);
  setSetting('apiKey', document.getElementById('apiKeyInput').value.trim());
  setSetting('baseUrl', document.getElementById('baseUrlInput').value.trim());
  setSetting('model', document.getElementById('modelInput').value.trim());
  setSetting('systemPrompt', document.getElementById('systemPromptInput').value);
  switchPage('chat');
}

function onProviderChange() {
  const p = document.getElementById('providerSelect').value;
  document.getElementById('baseUrlGroup').style.display = p === 'custom' ? 'block' : 'none';
  if (p !== 'custom') {
    document.getElementById('modelInput').placeholder = PROVIDER_CONFIG[p].defaultModel;
    if (!document.getElementById('modelInput').value.trim()) {
      document.getElementById('modelInput').value = PROVIDER_CONFIG[p].defaultModel;
    }
  }
}

function toggleKeyVis() {
  const i = document.getElementById('apiKeyInput');
  i.type = i.type === 'password' ? 'text' : 'password';
}

function togglePrompt() { document.getElementById('promptCollapse').classList.toggle('open'); }

async function testConnection() {
  // Save current form values first so callAPI can read them
  const p = document.getElementById('providerSelect').value;
  setSetting('provider', p);
  setSetting('apiKey', document.getElementById('apiKeyInput').value.trim());
  setSetting('baseUrl', document.getElementById('baseUrlInput').value.trim());
  setSetting('model', document.getElementById('modelInput').value.trim());
  setSetting('systemPrompt', document.getElementById('systemPromptInput').value);

  const r = document.getElementById('testResult');
  r.className = 'test-result'; r.textContent = '正在测试...';
  try {
    await callAPI('你好，请用一句话回应');
    r.className = 'test-result success'; r.textContent = '✓ 连接成功';
  } catch(e) {
    r.className = 'test-result error'; r.textContent = '✗ ' + (e.message || '连接失败');
  }
}

// ========== BLOOM STATE ==========
function setBloomState(state) {
  const avatar = document.getElementById('bloomAvatar');
  avatar.className = 'bloom-avatar ' + state;
  const dots = document.getElementById('statusDots');
  const label = document.getElementById('statusLabel');

  const map = {
    idle: { label: '你可以开始说话', dots: false },
    listening: { label: '正在聆听...', dots: true },
    thinking: { label: '正在思考...', dots: true },
    speaking: { label: '正在回答...', dots: true }
  };

  const s = map[state] || map.idle;
  label.textContent = s.label;
  dots.classList.toggle('active', s.dots);
}

// ========== MESSAGE PANEL ==========
function toggleMsgPanel() {
  panelOpen = !panelOpen;
  const panel = document.getElementById('msgPanel');
  const area = document.getElementById('characterArea');
  const actions = document.getElementById('chatActions');

  if (panelOpen) {
    panel.classList.add('active');
    area.classList.add('with-panel');
    actions.style.display = 'none';
    document.getElementById('panelInput').focus();
  } else {
    panel.classList.remove('active');
    area.classList.remove('with-panel');
    actions.style.display = 'flex';
  }
}

// ========== SCENE MODAL ==========
function openSceneModal() { document.getElementById('sceneModalOverlay').classList.add('active'); }
function closeSceneModal() { document.getElementById('sceneModalOverlay').classList.remove('active'); }

// ========== CHAT ==========
function appendMsg(role, content, source) {
  const list = document.getElementById('msgList');
  const div = document.createElement('div');
  div.className = 'message ' + role;
  let html = content.replace(/\n/g, '<br>');
  if (source && role === 'ai') html += `<div class="source-tag">📚 ${source}</div>`;
  div.innerHTML = html;
  list.appendChild(div);
  list.scrollTop = list.scrollHeight;
}

function showLoading() {
  const list = document.getElementById('msgList');
  const div = document.createElement('div');
  div.className = 'message loading'; div.id = 'loadingMsg';
  div.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
  list.appendChild(div);
  list.scrollTop = list.scrollHeight;
}

function removeLoading() { const el = document.getElementById('loadingMsg'); if (el) el.remove(); }

function scoreKnowledgeEntry(msg, entry) {
  const normalized = msg.toLowerCase();
  let score = 0;
  for (const kw of entry.trigger_keywords) {
    if (normalized.includes(String(kw).toLowerCase())) score += Math.max(1, Math.min(4, String(kw).length / 2));
  }
  return score;
}

function retrieveKnowledge(msg) {
  const matched = [];
  for (const e of KNOWLEDGE_BASE) {
    const score = scoreKnowledgeEntry(msg, e);
    if (score > 0) matched.push({ ...e, score });
  }
  if (!matched.length) return { context: '', source: '' };
  matched.sort((a, b) => b.score - a.score);
  const top = matched.slice(0, 3);
  return {
    context: top.map(m => `【${m.title}】${m.female_specific_info}\n来源：${m.source}`).join('\n\n'),
    source: [...new Set(top.map(m => m.source))].join('；')
  };
}

function buildBookContext() {
  return BOOKS.map(b => {
    const points = b.keyPoints.map(p => `- ${p}`).join('\n');
    return `《${b.title}》/${b.author}：${b.summary}\n${points}`;
  }).join('\n\n');
}

function resolveModel(provider, model) {
  const fallback = PROVIDER_CONFIG[provider]?.defaultModel || model;
  if (provider === 'doubao' && /^ark-/i.test(model || '')) return fallback;
  if (provider === 'doubao' && /seed/i.test(model || '')) return fallback;
  return model || fallback;
}

function cleanReply(text) {
  return (text || '')
    .replace(/<think>[\s\S]*?<\/think>/gi, '')
    .replace(/^[\s\S]{0,400}<\/think>/i, '')
    .replace(/^#{1,6}\s*/gm, '')
    .replace(/^\s*[-*]\s+/gm, '')
    .replace(/\*\*/g, '')
    .replace(/\n{3,}/g, '\n\n')
    .trim();
}

function staticKnowledgeReply(message, knowledgeContext) {
  const lower = message.toLowerCase();
  if (knowledgeContext) {
    return cleanReply(`${knowledgeContext}\n\n建议你把它当作一个需要被认真对待的信号：如果症状明显、持续、反复出现，优先寻求医生或专业机构帮助。以上来自 Bloom 当前资料索引。`);
  }
  if (lower.includes('知识库') || lower.includes('书') || lower.includes('来源')) {
    return 'Bloom 当前知识库包括《看不见的女性》《制造误诊》、AHA/WHO 女性心血管资料、FDA 药物性别差异研究、UN Women/Data2X 性别数据缺口报告，并补充交通安全和职场性别研究。';
  }
  return '我会先从女性视角帮你看这个问题。很多医学、交通、职场和产品设计数据长期以男性为默认样本，所以女性经验容易被忽略。你可以继续问心脏症状、用药剂量、驾车安全、痛经或职场谈薪，我会结合知识库回答。';
}

async function callAPI(message, knowledgeContext) {
  const provider = getSetting('provider') || 'doubao';
  const apiKey = getSetting('apiKey');
  const model = resolveModel(provider, getSetting('model') || PROVIDER_CONFIG[provider].defaultModel);
  const baseUrl = getSetting('baseUrl') || PROVIDER_CONFIG[provider].baseUrl;

  let sp = getSetting('systemPrompt') || DEFAULT_SYSTEM_PROMPT;
  sp += '\n\n以下书籍和报告是 Bloom 的常驻知识底座。回答涉及女性健康、药物、交通安全、职场、数据偏见时，请优先结合这些资料，不要编造未给出的书名、页码或统计：\n' + buildBookContext();
  if (knowledgeContext) sp += '\n\n以下是与用户问题相关的女性专项知识，请在回答中优先参考：\n' + knowledgeContext;

  const useLocalProxy = provider === 'doubao' && location.protocol !== 'file:';
  if (!apiKey && !useLocalProxy) throw new Error('请先在设置中配置 API Key，或使用 start_demo.bat 启动本地演示服务');

  const headers = { 'Content-Type': 'application/json' };
  if (!useLocalProxy) headers.Authorization = `Bearer ${apiKey}`;

  let res;
  try {
    res = await fetch(useLocalProxy ? '/api/chat' : baseUrl, {
      method: 'POST',
      headers,
      body: JSON.stringify({
        model, messages: [{ role:'system', content:sp }, ...messages.slice(-10), { role:'user', content:message }],
        temperature: 0.7, max_tokens: 600, stream: false
      })
    });
  } catch (e) {
    if (useLocalProxy) return staticKnowledgeReply(message, knowledgeContext);
    throw e;
  }

  if (!res.ok) {
    if (useLocalProxy) return staticKnowledgeReply(message, knowledgeContext);
    const t = await res.text();
    throw new Error(`API 错误 (${res.status}): ${t.slice(0,100)}`);
  }
  return cleanReply((await res.json()).choices[0].message.content);
}

async function sendMessage() {
  const input = document.getElementById('panelInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; autoResize(input); updatePanelSendBtn();

  if (!panelOpen) toggleMsgPanel();

  appendMsg('user', text);
  messages.push({ role:'user', content:text });
  setBloomState('thinking');
  showLoading();

  try {
    const { context, source } = retrieveKnowledge(text);
    const reply = await callAPI(text, context);
    removeLoading();
    appendMsg('ai', reply, source);
    messages.push({ role:'assistant', content:reply });

    document.getElementById('responseText').textContent = reply.slice(0, 100) + (reply.length > 100 ? '...' : '');

    setBloomState('speaking');
    speakText(reply);
    setTimeout(() => setBloomState('idle'), Math.max(3000, reply.length * 50));
  } catch(e) {
    removeLoading();
    appendMsg('ai', '遇到了一些问题：' + e.message);
    setBloomState('idle');
  }
}

function sendPreset(text) {
  closeSceneModal();
  document.getElementById('panelInput').value = text;
  sendMessage();
}

function handleKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 100) + 'px'; }

function updatePanelSendBtn() {
  const btn = document.getElementById('panelSendBtn');
  btn.classList.toggle('active', document.getElementById('panelInput').value.trim().length > 0);
}

// ========== VOICE ==========
function toggleVoice() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('请使用 Chrome 或 Edge 浏览器以支持语音输入'); return;
  }
  if (isRecording) finishVoiceAndSend(); else startRecording();
}

function startRecording() {
  if ('speechSynthesis' in window) speechSynthesis.cancel();
  primeSpeech();
  clearTimeout(voiceSilenceTimer);
  clearInterval(voiceWatchdog);
  latestVoiceText = '';
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'zh-CN';
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;
  keepListening = true;
  let finalTranscript = '';

  recognition.onresult = (e) => {
    let interimTranscript = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const text = e.results[i][0].transcript;
      if (e.results[i].isFinal) finalTranscript += text;
      else interimTranscript += text;
    }
    const currentText = (finalTranscript + interimTranscript).trim();
    latestVoiceText = currentText;
    const input = document.getElementById('panelInput');
    input.value = currentText;
    autoResize(input);
    updatePanelSendBtn();

    clearTimeout(voiceSilenceTimer);
    if (currentText) {
      voiceSilenceTimer = setTimeout(() => {
        finishVoiceAndSend();
      }, 2200);
    }
  };
  recognition.onerror = (e) => {
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      keepListening = false;
      stopRecording(false);
      alert('请允许浏览器使用麦克风');
    }
  };
  recognition.onend = () => {
    if (keepListening && isRecording) {
      try { recognition.start(); } catch (_) {}
      return;
    }
    isRecording = false;
    document.getElementById('voiceBtn').classList.remove('recording');
    if (document.getElementById('bloomAvatar').classList.contains('listening')) setBloomState('idle');
  };

  recognition.start();
  isRecording = true;
  document.getElementById('voiceBtn').classList.add('recording');
  setBloomState('listening');
  voiceWatchdog = setInterval(() => {
    const text = document.getElementById('panelInput').value.trim() || latestVoiceText.trim();
    if (isRecording && text && !voiceSilenceTimer) {
      voiceSilenceTimer = setTimeout(() => finishVoiceAndSend(), 2200);
    }
  }, 500);
}

function stopRecording(sendCurrent = false) {
  keepListening = false;
  clearTimeout(voiceSilenceTimer);
  clearInterval(voiceWatchdog);
  voiceSilenceTimer = null;
  voiceWatchdog = null;
  if (recognition) {
    try { recognition.stop(); } catch (_) {}
  }
  isRecording = false;
  document.getElementById('voiceBtn').classList.remove('recording');
  if (document.getElementById('bloomAvatar').classList.contains('listening')) setBloomState('idle');
  if (sendCurrent && document.getElementById('panelInput').value.trim()) sendMessage();
}

function finishVoiceAndSend() {
  const input = document.getElementById('panelInput');
  const text = (input.value.trim() || latestVoiceText.trim());
  if (!text) { stopRecording(false); return; }
  input.value = text;
  autoResize(input);
  updatePanelSendBtn();
  stopRecording(false);
  sendMessage();
}

function getChineseVoice() {
  const voices = speechSynthesis.getVoices();
  return voices.find(v => v.lang.toLowerCase().startsWith('zh') && /female|xiaoxiao|xiaoyi|huihui|yaoyao/i.test(v.name))
    || voices.find(v => v.lang.toLowerCase().startsWith('zh'))
    || voices[0];
}

function primeSpeech() {
  if (!('speechSynthesis' in window)) return;
  try {
    speechSynthesis.resume();
    const u = new SpeechSynthesisUtterance(' ');
    u.volume = 0;
    u.lang = 'zh-CN';
    speechSynthesis.speak(u);
    setTimeout(() => speechSynthesis.cancel(), 50);
  } catch (_) {}
}

function speakText(text) {
  if (!('speechSynthesis' in window)) {
    setBloomState('idle');
    return;
  }
  speechSynthesis.cancel();
  const chunks = cleanReply(text).match(/[^。！？!?；;，,]{1,80}[。！？!?；;，,]?/g) || [text];
  let index = 0;
  let started = false;

  const speakNext = () => {
    started = true;
    if (index >= chunks.length) {
      setBloomState('idle');
      return;
    }
    const u = new SpeechSynthesisUtterance(chunks[index++]);
    u.lang = 'zh-CN';
    u.rate = 0.95;
    u.pitch = 1.08;
    const voice = getChineseVoice();
    if (voice) u.voice = voice;
    u.onend = speakNext;
    u.onerror = () => setBloomState('idle');
    speechSynthesis.speak(u);
    setTimeout(() => { if (speechSynthesis.paused) speechSynthesis.resume(); }, 250);
  };

  if (!speechSynthesis.getVoices().length) {
    speechSynthesis.onvoiceschanged = () => { if (!started) speakNext(); };
    setTimeout(() => { if (!started) speakNext(); }, 500);
  } else {
    speakNext();
  }
}

// ========== LIBRARY ==========
function renderLibrary() {
  const tags = ['全部', ...new Set(BOOKS.flatMap(b => b.tags))];
  document.getElementById('tagFilter').innerHTML = tags.map(t =>
    `<button class="tag-btn ${t===currentFilter?'active':''}" onclick="filterBooks('${t}')">${t}</button>`
  ).join('');

  const list = currentFilter === '全部' ? BOOKS : BOOKS.filter(b => b.tags.includes(currentFilter));
  document.getElementById('bookList').innerHTML = list.map(b => `
    <div class="book-card" onclick="openDrawer(${b.id})">
      <div class="book-cover" style="background:${b.coverColor}"></div>
      <div class="book-info">
        <div class="book-title">《${b.title}》</div>
        <div class="book-author">${b.author} · ${b.year}</div>
        <div class="book-summary">${b.summary}</div>
        <div class="book-footer">
          ${b.tags.slice(0,2).map(t=>`<span class="book-tag">${t}</span>`).join('')}
          <span class="book-included">✓ 已纳入</span>
        </div>
      </div>
    </div>
  `).join('');
}

function filterBooks(t) { currentFilter = t; renderLibrary(); }

function openDrawer(id) {
  const b = BOOKS.find(x => x.id === id); if (!b) return;
  document.getElementById('drawerTitle').textContent = `《${b.title}》`;
  document.getElementById('drawerSubtitle').textContent = `${b.author} · ${b.publisher} · ${b.year}`;
  document.getElementById('drawerPoints').innerHTML = b.keyPoints.map(p=>`<li>${p}</li>`).join('');
  document.getElementById('drawerOverlay').classList.add('active');
}

function closeDrawer() { document.getElementById('drawerOverlay').classList.remove('active'); }

// ========== START ==========
init();
</script>
